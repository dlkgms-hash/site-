<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyun Gezegeni</title>
    <style>
        /* Genel Ayarlar */
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* Sol Üst Ayarlar Paneli */
        .settings-panel {
            position: fixed;
            top: 20px;
            left: 20px;
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .settings-panel h3 { margin: 0 0 10px 0; font-size: 16px; }
        .settings-panel button {
            background-color: #ff4757;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Arama Alanı (Ekranın Ortası) */
        .hero-section {
            text-align: center;
            margin-top: 15vh;
            margin-bottom: 50px;
        }
        .hero-section h1 { font-size: 3rem; margin-bottom: 20px; }
        .search-bar {
            width: 400px;
            max-width: 80%;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #2e2e2e;
            border-radius: 30px;
            background-color: #1e1e1e;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus { border-color: #ff4757; }

        /* Oyun Listesi Alanı */
        .games-container {
            width: 85%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 25px;
            padding-bottom: 50px;
        }

        /* Oyun Kartı Tasarımı */
        .game-card {
            background-color: #1e1e1e;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: transform 0.3s;
            text-decoration: none;
            color: white;
        }
        .game-card:hover { transform: translateY(-5px); }
        .game-thumb {
            width: 100%;
            height: 150px;
            background-color: #2e2e2e;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        .game-info { padding: 15px; }
        .game-info h3 { margin: 0 0 10px 0; }
        .game-info p { margin: 0; color: #aaa; font-size: 14px; }
    </style>
</head>
<body>

    <div class="settings-panel">
        <h3>⚙️ Ayarlar</h3>
        <button onclick="alert('Koyu mod aktif!')">Tema Değiştir</button>
    </div>

    <div class="hero-section">
        <h1>Oyun Dünyası</h1>
        <input type="text" class="search-bar" id="search" placeholder="Oyun ara..." onkeyup="searchGame()">
    </div>

    <div class="games-container" id="gamesList">
        
        <a href="oyunlar/tetris/index.html" class="game-card" data-name="tetris">
            <div class="game-thumb">🧱</div>
            <div class="game-info">
                <h3>Tetris Klasik</h3>
                <p>Blokları yerleştir ve puanları topla!</p>
            </div>
        </a>

        <a href="oyunlar/yaris/index.html" class="game-card" data-name="hızlı yarış">
            <div class="game-thumb">🏎️</div>
            <div class="game-info">
                <h3>Hızlı Yarış</h3>
                <p>En hızlı sen ol, rakiplerini ele.</p>
            </div>
        </a>

        </div>

    <script>
        // Basit Arama Fonksiyonu
        function searchGame() {
            let input = document.getElementById('search').value.toLowerCase();
            let cards = document.getElementsByClassName('game-card');
            
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name');
                if (name.includes(input)) {
                    cards[i].style.display = "";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>
</body>
</html>
