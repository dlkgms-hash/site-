<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Balistik Top Oyunu</title>
    <style>
        body {
            margin: 0;
            background: #141414;
            color: white;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        #gameCanvas {
            background: #222;
            border: 4px solid #fff;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            cursor: crosshair;
        }
        #ui {
            position: absolute;
            top: 20px;
            font-size: 22px;
            font-weight: bold;
            display: flex;
            gap: 30px;
            text-shadow: 2px 2px 4px #000;
        }
    </style>
</head>
<body>

    <div id="ui">
        <div>Skor: <span id="score">0</span></div>
        <div>Atış Hakları: <span id="shots">5</span></div>
    </div>

    <canvas id="gameCanvas" width="600" height="450"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        let score = 0;
        let shots = 5;
        let isAiming = false;

        // Fırlatıcı (Sol Alt Köşe)
        const launcher = { x: 50, y: 400 };

        // Top Özellikleri
        let ball = { x: 50, y: 400, vx: 0, vy: 0, radius: 12, launched: false };

        // Hedef Özellikleri (Sağ Taraf)
        let target = { x: 500, y: 200, radius: 25, color: "#ff4757" };

        // Fare Koordinatları
        let mouse = { x: 0, y: 0 };

        canvas.addEventListener("mousedown", (e) => {
            if (!ball.launched && shots > 0) isAiming = true;
        });

        canvas.addEventListener("mousemove", (e) => {
            const rect = canvas.getBoundingClientRect();
            mouse.x = e.clientX - rect.left;
            mouse.y = e.clientY - rect.top;
        });

        canvas.addEventListener("mouseup", (e) => {
            if (isAiming) {
                isAiming = false;
                ball.launched = true;
                shots--;
                document.getElementById("shots").innerText = shots;

                // Çekme hızını hesapla
                ball.vx = (launcher.x - mouse.x) * 0.15;
                ball.vy = (launcher.y - mouse.y) * 0.15;
            }
        });

        function moveTarget() {
            target.x = 400 + Math.random() * 150;
            target.y = 100 + Math.random() * 250;
        }

        function resetBall() {
            ball.x = launcher.x;
            ball.y = launcher.y;
            ball.vx = 0;
            ball.vy = 0;
            ball.launched = false;

            if (shots <= 0) {
                alert("Oyun Bitti! Toplam Skorun: " + score);
                score = 0;
                shots = 5;
                document.getElementById("score").innerText = score;
                document.getElementById("shots").innerText = shots;
                moveTarget();
            }
        }

        function gameLoop() {
            // Fizik Güncellemeleri
            if (ball.launched) {
                ball.x += ball.vx;
                ball.y += ball.vy;
                ball.vy += 0.2; // Yerçekimi etkisi

                // Hedef Vuruldu mu? (Mesafe Kontrolü)
                let dx = ball.x - target.x;
                let dy = ball.y - target.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < ball.radius + target.radius) {
                    score += 20;
                    document.getElementById("score").innerText = score;
                    shots += 2; // Ödül atış hakkı
                    document.getElementById("shots").innerText = shots;
                    moveTarget();
                    resetBall();
                }

                // Ekrandan çıktı mı kontrolü
                if (ball.x > canvas.width || ball.y > canvas.height || ball.x < 0) {
                    resetBall();
                }
            }

            // Çizim Dünyası
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Hedefi Çiz (İç İçe Halkalar)
            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius, 0, Math.PI * 2);
            ctx.fillStyle = target.color;
            ctx.fill();
            ctx.closePath();

            ctx.beginPath();
            ctx.arc(target.x, target.y, target.radius * 0.6, 0, Math.PI * 2);
            ctx.fillStyle = "#fff";
            ctx.fill();
            ctx.closePath();

            // Nişan Alma Çizgisi
            if (isAiming) {
                ctx.beginPath();
                ctx.moveTo(launcher.x, launcher.y);
                // Çektiğin yönün tersine nişan çizgisi uzatılır
                let targetX = launcher.x + (launcher.x - mouse.x);
                let targetY = launcher.y + (launcher.y - mouse.y);
                ctx.lineTo(targetX, targetY);
                ctx.strokeStyle = "#2ed573";
                ctx.lineWidth = 3;
                ctx.setLineDash([5, 5]);
                ctx.stroke();
                ctx.setLineDash([]);
            }

            // Topu Çiz
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
            ctx.fillStyle = "#ffa502";
            ctx.fill();
            ctx.strokeStyle = "#fff";
            ctx.stroke();
            ctx.closePath();

            // Fırlatıcı Tabanını Çiz
            ctx.beginPath();
            ctx.arc(launcher.x, launcher.y, 20, 0, Math.PI, true);
            ctx.fillStyle = "#555";
            ctx.fill();
            ctx.closePath();

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
